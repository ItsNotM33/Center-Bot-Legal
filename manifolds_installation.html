<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Installation des Manifolds – TP Froid</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1a3a5c;
    --blue-light: #2563a8;
    --cyan: #00b4d8;
    --red: #e63946;
    --yellow: #ffc300;
    --green: #2dc653;
    --bg: #0d1b2a;
    --card: #132238;
    --card2: #1a2e45;
    --text: #e0eaf5;
    --muted: #7a94b0;
    --border: #254060;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1b2a 0%, #1a3a5c 100%);
    border-bottom: 3px solid var(--cyan);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .header-icon { font-size: 2.2rem; }
  header h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.7rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }
  header h1 span { color: var(--cyan); }
  .header-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  /* PROGRESS BAR */
  .progress-container {
    padding: 16px 28px 0;
    background: var(--bg);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .progress-track {
    height: 6px;
    background: var(--card2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cyan), var(--green));
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  /* PHASE TABS */
  .phase-tabs {
    display: flex;
    gap: 0;
    padding: 16px 28px 0;
    border-bottom: 1px solid var(--border);
  }
  .phase-tab {
    padding: 8px 20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .phase-tab.active { color: var(--cyan); border-bottom-color: var(--cyan); }
  .phase-tab.done { color: var(--green); }
  .phase-tab:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MAIN LAYOUT */
  .main {
    padding: 24px 28px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* STEP CARD */
  .step-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  .step-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue-light), var(--cyan));
  }
  .step-card.phase-measure::before { background: linear-gradient(90deg, var(--yellow), #ff9f1c); }
  .step-card.phase-remove::before { background: linear-gradient(90deg, var(--red), #ff6b6b); }

  .step-number {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 4rem;
    font-weight: 900;
    color: var(--blue-light);
    opacity: 0.18;
    position: absolute;
    top: 12px; right: 20px;
    line-height: 1;
    pointer-events: none;
  }

  .step-phase-tag {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
  }
  .tag-install { background: rgba(0,180,216,0.15); color: var(--cyan); }
  .tag-measure { background: rgba(255,195,0,0.15); color: var(--yellow); }
  .tag-remove { background: rgba(230,57,70,0.15); color: var(--red); }

  .step-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #fff;
    line-height: 1.4;
    padding-right: 50px;
  }

  /* MEASUREMENT SECTION */
  .measure-section {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .measure-section h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .measure-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .measure-field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .measure-field label {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .measure-field select,
  .measure-field input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 9px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
    -moz-appearance: textfield;
  }
  .measure-field select:focus,
  .measure-field input[type="number"]:focus { border-color: var(--cyan); }
  .measure-field input[type="number"]::-webkit-outer-spin-button,
  .measure-field input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
  .measure-field select option { background: var(--bg); }
  .measure-unit {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 2px;
  }
  .measure-full { grid-column: 1 / -1; }

  /* CALCULATION SECTION */
  .calc-section {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .calc-section h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .calc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .calc-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
  }
  .calc-box h4 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .calc-box.sh h4 { color: var(--cyan); }
  .calc-box.sc h4 { color: var(--yellow); }
  .calc-formula {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 12px;
    font-style: italic;
    line-height: 1.5;
  }
  .calc-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .calc-input-row input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 9px 12px;
    font-family: 'Barlow', sans-serif;
    font-size: 1rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  .calc-input-row input::-webkit-outer-spin-button,
  .calc-input-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .calc-input-row input:focus { border-color: var(--cyan); }
  .calc-unit-label {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
    padding-bottom: 10px;
  }
  .btn-check-calc {
    margin-top: 10px;
    width: 100%;
    padding: 9px;
    background: linear-gradient(135deg, var(--blue-light), var(--cyan));
    border: none;
    border-radius: 5px;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn-check-calc:hover { opacity: 0.85; }
  .calc-feedback {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 5px;
    font-size: 0.85rem;
    display: none;
    line-height: 1.5;
  }
  .calc-feedback.wrong { background: rgba(230,57,70,0.15); border: 1px solid var(--red); color: #ff8a8a; display: block; }
  .calc-feedback.correct { background: rgba(45,198,83,0.15); border: 1px solid var(--green); color: var(--green); display: block; }
  .calc-feedback.solution { background: rgba(255,195,0,0.12); border: 1px solid var(--yellow); color: var(--yellow); display: block; }

  /* NAVIGATION BUTTONS */
  .nav-buttons {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 6px;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .btn-validate {
    background: linear-gradient(135deg, var(--green), #1fa843);
    color: #fff;
    flex: 1;
  }
  .btn-validate:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(45,198,83,0.3); }
  .btn-validate:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-back {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 12px 18px;
  }
  .btn-back:hover { color: var(--text); border-color: var(--muted); }
  .btn-back:disabled { opacity: 0.3; cursor: not-allowed; }

  /* VALIDATED BADGE */
  .validated-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(45,198,83,0.15);
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 5px;
    padding: 6px 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* COMPLETED STATE */
  .all-done {
    text-align: center;
    padding: 40px 20px;
    display: none;
  }
  .all-done h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .all-done p { color: var(--muted); margin-bottom: 24px; line-height: 1.7; }

  /* SUMMARY TABLE */
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: left;
  }
  .summary-card h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cyan);
    margin-bottom: 14px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-label { color: var(--muted); }
  .summary-value { color: var(--text); font-weight: 500; }

  /* EMAIL SECTION */
  .email-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: left;
  }
  .email-section h3 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--yellow);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .email-field-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 12px;
  }
  .email-field-row label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .email-field-row input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 10px 14px;
    font-family: 'Barlow', sans-serif;
    font-size: 0.95rem;
    outline: none;
    width: 100%;
    transition: border-color 0.2s;
  }
  .email-field-row input:focus { border-color: var(--yellow); }
  .btn-send {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, var(--yellow), #ff9f1c);
    border: none;
    border-radius: 6px;
    color: #0d1b2a;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.05rem;
    font-weight: 900;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(255,195,0,0.4); }
  .send-feedback {
    margin-top: 12px;
    padding: 12px;
    border-radius: 6px;
    font-size: 0.9rem;
    display: none;
    text-align: center;
  }
  .send-feedback.success { background: rgba(45,198,83,0.15); border: 1px solid var(--green); color: var(--green); display: block; }
  .send-feedback.info { background: rgba(0,180,216,0.12); border: 1px solid var(--cyan); color: var(--cyan); display: block; }

  /* STEP NAV DOTS */
  .steps-overview {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    padding: 12px 28px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  .step-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--card2);
    border: 1px solid var(--border);
    transition: all 0.2s;
    cursor: default;
    position: relative;
  }
  .step-dot.done { background: var(--green); border-color: var(--green); }
  .step-dot.current { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan); }
  .step-dot.phase-measure { border-color: var(--yellow); }
  .step-dot.phase-measure.done { background: var(--yellow); border-color: var(--yellow); }
  .step-dot.phase-remove { border-color: var(--red); }
  .step-dot.phase-remove.done { background: var(--red); border-color: var(--red); }

  @media (max-width: 600px) {
    .main { padding: 16px; }
    header { padding: 14px 16px; }
    .phase-tabs { padding: 12px 16px 0; overflow-x: auto; }
    .measure-grid { grid-template-columns: 1fr; }
    .calc-grid { grid-template-columns: 1fr; }
    .steps-overview { padding: 10px 16px; }
    .progress-container { padding: 12px 16px 0; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">🔵</div>
  <div>
    <h1>Installation des <span>Manifolds</span></h1>
    <div class="header-sub">TP Froid — Procédure d'intervention sur circuit frigorifique</div>
  </div>
</header>

<div class="progress-container">
  <div class="progress-label">
    <span>Progression</span>
    <span id="prog-text">0 / 40 étapes</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="steps-overview" id="steps-dots"></div>

<div class="phase-tabs">
  <button class="phase-tab active" id="tab-install" onclick="goToPhase(0)">🔧 Installation (1–16)</button>
  <button class="phase-tab" id="tab-measure" onclick="goToPhase(1)" disabled>📊 Mesures (17–22)</button>
  <button class="phase-tab" id="tab-remove" onclick="goToPhase(2)" disabled>🔩 Démontage (23–40)</button>
</div>

<div class="main" id="main-content">
  <div id="step-view"></div>
  <div class="all-done" id="all-done-view"></div>
</div>

<script>
// ========================
// DATA
// ========================
const REFRIGERANTS = [
  "R-22","R-134a","R-404A","R-407C","R-410A","R-448A","R-449A","R-452A","R-507A","R-290 (Propane)","R-600a (Isobutane)"
];

// Temperatures d'évaporation et condensation de référence par fluide (simplifiées, pour correction)
// Surchauffe = T_aspiration - T_evaporation
// Sous-refroidissement = T_condensation_fluide - T_sortie_condenseur

const steps = [
  // PHASE INSTALL (0-15)
  { id:1, phase:'install', text:"Retirer les bouchons noirs des vannes de service." },
  { id:2, phase:'install', text:"Desserrer les presse-étoupes d'1/4 de tour sur chaque vanne." },
  { id:3, phase:'install', text:"Contrôler que les vannes de service se trouvent en siège arrière avec la clé à cliquet." },
  { id:4, phase:'install', text:"Desserrer les bouchons des prises de pressions des vannes de service." },
  { id:5, phase:'install', text:"Raccorder les flexibles du manifold sur les vannes de service." },
  { id:6, phase:'install', text:"Contrôler que le flexible rouge HP est raccordé sur la vanne de service de la bouteille liquide." },
  { id:7, phase:'install', text:"Contrôler que le flexible bleu BP est raccordé sur la vanne de service aspiration compresseur." },
  { id:8, phase:'install', text:"Raccorder le flexible jaune sur la pompe à vide." },
  { id:9, phase:'install', text:"Ouvrir les vannes des flexibles et les robinets du manifold." },
  { id:10, phase:'install', text:"Mettre en fonctionnement la pompe à vide et tirer au vide les flexibles du manifold." },
  { id:11, phase:'install', text:"Vérifier que les aiguilles des manifolds indiquent -1 bar." },
  { id:12, phase:'install', text:"Refermer la vanne du flexible jaune." },
  { id:13, phase:'install', text:"Refermer les deux robinets du manifold." },
  { id:14, phase:'install', text:"Arrêter la pompe à vide." },
  { id:15, phase:'install', text:"Ouvrir d'1/4 de tour les carrés de manœuvre avec la clé à cliquet." },
  { id:16, phase:'install', text:"Contrôler et noter les pressions HP et BP de l'installation.", hasMeasureHP_BP: true },
  // PHASE MEASURE (16-21)
  { id:17, phase:'measure', text:"Mettre en fonctionnement le circuit frigorifique.", isMeasureStart: true },
  { id:18, phase:'measure', text:"Reporter la pression HP de l'installation.", hasMeasureHP: true },
  { id:19, phase:'measure', text:"Reporter la pression BP de l'installation.", hasMeasureBP: true },
  { id:20, phase:'measure', text:"Relever et noter la température sortie condenseur.", hasMeasureTsc: true },
  { id:21, phase:'measure', text:"Relever et noter la température au bulbe du détendeur.", hasMeasureTbulbe: true },
  { id:22, phase:'measure', text:"Relever et noter la température aspiration compresseur.", hasMeasureTaskp: true },
  // PHASE REMOVE (22-39)
  { id:23, phase:'remove', text:"Positionner la vanne de service HP en siège arrière." },
  { id:24, phase:'remove', text:"Resserrer le presse-étoupe de la vanne de service HP." },
  { id:25, phase:'remove', text:"Vérifier que la vanne ¼ de tour du flexible jaune est fermée." },
  { id:26, phase:'remove', text:"Ouvrir les robinets du manifold." },
  { id:27, phase:'remove', text:"Contrôler que les manifolds HP et BP indiquent la même pression." },
  { id:28, phase:'remove', text:"Arrêter l'alimentation de l'électrovanne." },
  { id:29, phase:'remove', text:"Vérifier que la pression dans les manifolds chute et atteint 0,2 bar." },
  { id:30, phase:'remove', text:"Vérifier l'arrêt du compresseur." },
  { id:31, phase:'remove', text:"Actionner le pressostat BP pour remettre en fonctionnement le compresseur." },
  { id:32, phase:'remove', text:"Contrôler que la pression BP chute en dessous de 0 bar." },
  { id:33, phase:'remove', text:"Mettre la vanne de service BP en siège arrière." },
  { id:34, phase:'remove', text:"Resserrer le presse-étoupe de la vanne de service BP." },
  { id:35, phase:'remove', text:"Vérifier que les manifolds indiquent une pression en dessous de 0." },
  { id:36, phase:'remove', text:"Desserrer les flexibles HP et BP des vannes de service du circuit." },
  { id:37, phase:'remove', text:"Refermer les bouchons des prises de pressions des vannes de service." },
  { id:38, phase:'remove', text:"Refermer les bouchons noirs des vannes de service." },
  { id:39, phase:'remove', text:"Effectuer un contrôle d'étanchéité avec un détecteur électronique sur les vannes de service." },
  { id:40, phase:'remove', text:"Compléter la feuille CERFA intervention sur circuit frigorifique." },
];

// ========================
// STATE
// ========================
let currentStep = 0; // 0-indexed
let validated = new Array(40).fill(false);
let measurements = {
  fluid: '',
  hp16: '', bp16: '',
  hp: '', bp: '',
  tCond: '', tEvap: '', // temperatures calculées depuis les pressions (pour référence)
  tSortieCondenseur: '',
  tBulbe: '',
  tAspiration: '',
};
let calcAttempts = { sh: 0, sc: 0 };
let calcCorrect = { sh: false, sc: false };
let studentName = '';

// ========================
// PHASE HELPERS
// ========================
function getPhase(idx) {
  if (idx <= 15) return 'install';
  if (idx <= 21) return 'measure';
  return 'remove';
}

function phaseLabel(p) {
  if (p==='install') return 'Installation';
  if (p==='measure') return 'Prise de mesures';
  return 'Démontage';
}
function phaseTag(p) {
  if (p==='install') return `<span class="step-phase-tag tag-install">Installation</span>`;
  if (p==='measure') return `<span class="step-phase-tag tag-measure">📊 Mesures</span>`;
  return `<span class="step-phase-tag tag-remove">🔩 Démontage</span>`;
}

// ========================
// RENDER DOTS
// ========================
function renderDots() {
  const container = document.getElementById('steps-dots');
  container.innerHTML = '';
  steps.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'step-dot';
    dot.title = `Étape ${s.id}`;
    if (s.phase !== 'install') dot.classList.add(`phase-${s.phase}`);
    if (validated[i]) dot.classList.add('done');
    if (i === currentStep && !validated[i]) dot.classList.add('current');
    container.appendChild(dot);
  });
}

// ========================
// RENDER PROGRESS
// ========================
function renderProgress() {
  const done = validated.filter(Boolean).length;
  document.getElementById('prog-text').textContent = `${done} / 40 étapes`;
  document.getElementById('prog-fill').style.width = `${(done/40)*100}%`;
}

// ========================
// RENDER PHASE TABS
// ========================
function renderTabs() {
  const phaseUnlocked = [true, false, false];
  // Phase 1 unlocked when all install steps done (idx 0-15)
  if (validated.slice(16, 22).some(Boolean) || validated.slice(0, 16).every(Boolean)) phaseUnlocked[1] = true;
  if (validated.slice(22, 40).some(Boolean) || validated.slice(0, 22).every(Boolean)) phaseUnlocked[2] = true;

  document.getElementById('tab-install').disabled = false;
  document.getElementById('tab-measure').disabled = !phaseUnlocked[1];
  document.getElementById('tab-remove').disabled = !phaseUnlocked[2];

  ['install','measure','remove'].forEach((p,i) => {
    const tab = document.getElementById(['tab-install','tab-measure','tab-remove'][i]);
    tab.classList.remove('active','done');
    const phaseSteps = steps.filter(s=>s.phase===p);
    if (phaseSteps.every((_,j)=>{
      const globalIdx = steps.findIndex(s=>s.phase===p) + j;
      return validated[globalIdx];
    })) tab.classList.add('done');
    if (getPhase(currentStep) === p) tab.classList.add('active');
  });
}

// ========================
// CHECK CALCULATIONS
// ========================
// Simplified temp from pressure lookup (approximate, for major fluids)
// Real implementation: use psychrometric tables. Here we use linear approximations.
function approxTempFromPressure(fluid, pressure_rel) {
  // Pressure absolute = pressure_rel + 1.013
  const pa = parseFloat(pressure_rel) + 1.013;
  // Very rough Antoine-style approximations
  const map = {
    'R-22':       p => -41.36 + 18.8*Math.log(p),
    'R-134a':     p => -40.0  + 21.0*Math.log(p),
    'R-404A':     p => -46.5  + 17.5*Math.log(p),
    'R-407C':     p => -43.0  + 19.2*Math.log(p),
    'R-410A':     p => -51.5  + 16.8*Math.log(p),
    'R-448A':     p => -45.0  + 17.8*Math.log(p),
    'R-449A':     p => -45.5  + 17.9*Math.log(p),
    'R-452A':     p => -48.0  + 17.2*Math.log(p),
    'R-507A':     p => -47.1  + 17.4*Math.log(p),
    'R-290 (Propane)': p => -42.1 + 20.1*Math.log(p),
    'R-600a (Isobutane)': p => -11.7 + 25.5*Math.log(p),
  };
  const fn = map[fluid];
  if (!fn || isNaN(pa) || pa <= 0) return null;
  return fn(pa);
}

function checkCalc(type) {
  const fluid = measurements.fluid;
  if (!fluid) {
    alert('Veuillez d\'abord sélectionner le fluide frigorigène à l\'étape 17.');
    return;
  }

  if (type === 'sh') {
    calcAttempts.sh++;
    const tEvap = approxTempFromPressure(fluid, measurements.bp);
    const tAsp = parseFloat(measurements.tAspiration);
    const studentVal = parseFloat(document.getElementById('inp-sh').value);
    const fb = document.getElementById('fb-sh');

    if (isNaN(tEvap) || isNaN(tAsp)) {
      fb.className = 'calc-feedback wrong';
      fb.textContent = '⚠️ Vérifiez que les températures ont bien été saisies aux étapes précédentes.';
      return;
    }
    const correct = Math.round((tAsp - tEvap) * 10) / 10;

    if (!isNaN(studentVal) && Math.abs(studentVal - correct) <= 1.5) {
      fb.className = 'calc-feedback correct';
      fb.textContent = `✅ Correct ! Surchauffe = ${correct.toFixed(1)} K — Bonne valeur !`;
      calcCorrect.sh = true;
      document.getElementById('inp-sh').disabled = true;
      document.querySelector('.calc-box.sh .btn-check-calc').disabled = true;
    } else if (calcAttempts.sh >= 2) {
      fb.className = 'calc-feedback solution';
      fb.innerHTML = `💡 Solution : T<sub>évaporation</sub> ≈ ${tEvap.toFixed(1)}°C | T<sub>aspiration</sub> = ${tAsp.toFixed(1)}°C<br><strong>SH = ${tAsp.toFixed(1)} − (${tEvap.toFixed(1)}) = ${correct.toFixed(1)} K</strong>`;
      calcCorrect.sh = true;
      document.getElementById('inp-sh').value = correct.toFixed(1);
      document.getElementById('inp-sh').disabled = true;
      document.querySelector('.calc-box.sh .btn-check-calc').disabled = true;
    } else {
      fb.className = 'calc-feedback wrong';
      fb.textContent = `❌ Résultat incorrect. Essai ${calcAttempts.sh}/2. Relisez votre formule.`;
    }
  }

  if (type === 'sc') {
    calcAttempts.sc++;
    const tCond = approxTempFromPressure(fluid, measurements.hp);
    const tSortie = parseFloat(measurements.tSortieCondenseur);
    const studentVal = parseFloat(document.getElementById('inp-sc').value);
    const fb = document.getElementById('fb-sc');

    if (isNaN(tCond) || isNaN(tSortie)) {
      fb.className = 'calc-feedback wrong';
      fb.textContent = '⚠️ Vérifiez que les températures ont bien été saisies aux étapes précédentes.';
      return;
    }
    const correct = Math.round((tCond - tSortie) * 10) / 10;

    if (!isNaN(studentVal) && Math.abs(studentVal - correct) <= 1.5) {
      fb.className = 'calc-feedback correct';
      fb.textContent = `✅ Correct ! Sous-refroidissement = ${correct.toFixed(1)} K — Très bien !`;
      calcCorrect.sc = true;
      document.getElementById('inp-sc').disabled = true;
      document.querySelector('.calc-box.sc .btn-check-calc').disabled = true;
    } else if (calcAttempts.sc >= 2) {
      fb.className = 'calc-feedback solution';
      fb.innerHTML = `💡 Solution : T<sub>condensation</sub> ≈ ${tCond.toFixed(1)}°C | T<sub>sortie condenseur</sub> = ${tSortie.toFixed(1)}°C<br><strong>SR = ${tCond.toFixed(1)} − ${tSortie.toFixed(1)} = ${correct.toFixed(1)} K</strong>`;
      calcCorrect.sc = true;
      document.getElementById('inp-sc').value = correct.toFixed(1);
      document.getElementById('inp-sc').disabled = true;
      document.querySelector('.calc-box.sc .btn-check-calc').disabled = true;
    } else {
      fb.className = 'calc-feedback wrong';
      fb.textContent = `❌ Résultat incorrect. Essai ${calcAttempts.sc}/2. Relisez votre formule.`;
    }
  }

  // Check if both done for validate button
  checkCalcDone();
}

function checkCalcDone() {
  const btn = document.getElementById('btn-validate');
  if (btn && currentStep === 21) {
    btn.disabled = !(calcCorrect.sh && calcCorrect.sc);
  }
}

// ========================
// CAN VALIDATE
// ========================
function canValidate() {
  const step = steps[currentStep];
  if (currentStep === 21) return calcCorrect.sh && calcCorrect.sc;
  return true;
}

// ========================
// RENDER STEP
// ========================
function renderStep() {
  const step = steps[currentStep];
  const phase = step.phase;
  const isDone = validated[currentStep];

  const phaseClass = phase === 'install' ? '' : `phase-${phase}`;

  let measureHTML = buildMeasureSection(step);
  let calcHTML = buildCalcSection();

  let validateBtn;
  if (isDone) {
    validateBtn = `<span class="validated-badge">✅ Étape validée</span>`;
  } else if (currentStep === 21) {
    validateBtn = `<button class="btn btn-validate" id="btn-validate" onclick="validateStep()" disabled>✔ Valider l'étape</button>`;
  } else {
    validateBtn = `<button class="btn btn-validate" id="btn-validate" onclick="validateStep()">✔ Valider l'étape</button>`;
  }

  document.getElementById('step-view').innerHTML = `
  <div class="step-card ${phaseClass}">
    <div class="step-number">${step.id}</div>
    ${phaseTag(phase)}
    <div class="step-title">${step.text}</div>
  </div>
  ${measureHTML}
  ${calcHTML}
  <div class="nav-buttons">
    <button class="btn btn-back" onclick="goBack()" ${currentStep===0?'disabled':''}>← Retour</button>
    ${validateBtn}
  </div>
  `;

  // Restore calc states if re-rendering
  if (currentStep === 21) {
    if (calcCorrect.sh) {
      const shFb = document.getElementById('fb-sh');
      if (shFb) { shFb.className = 'calc-feedback correct'; shFb.textContent = '✅ Surchauffe validée.'; }
    }
    if (calcCorrect.sc) {
      const scFb = document.getElementById('fb-sc');
      if (scFb) { scFb.className = 'calc-feedback correct'; scFb.textContent = '✅ Sous-refroidissement validé.'; }
    }
    checkCalcDone();
  }
}

// ========================
// VALIDATE STEP
// ========================
function validateStep() {
  validated[currentStep] = true;
  renderProgress();
  renderDots();
  renderTabs();

  const nextIdx = currentStep + 1;
  if (nextIdx >= steps.length) {
    showAllDone();
    return;
  }
  currentStep = nextIdx;
  renderStep();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================
// GO BACK
// ========================
function goBack() {
  if (currentStep > 0) {
    currentStep--;
    renderStep();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ========================
// GO TO PHASE
// ========================
function goToPhase(p) {
  const phaseStarts = [0, 16, 22];
  currentStep = phaseStarts[p];
  // Advance to first non-validated
  while (currentStep < steps.length - 1 && validated[currentStep]) {
    currentStep++;
  }
  document.getElementById('all-done-view').style.display = 'none';
  document.getElementById('step-view').style.display = '';
  renderStep();
  renderTabs();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ========================
// ALL DONE
// ========================
function showAllDone() {
  document.getElementById('step-view').style.display = 'none';
  const doneDiv = document.getElementById('all-done-view');
  doneDiv.style.display = 'block';

  const fluid = measurements.fluid || '—';
  const hp = measurements.hp || measurements.hp16 || '—';
  const bp = measurements.bp || measurements.bp16 || '—';
  const tSC = measurements.tSortieCondenseur || '—';
  const tBulbe = measurements.tBulbe || '—';
  const tAsp = measurements.tAspiration || '—';

  const tEvap = measurements.fluid && measurements.bp ? approxTempFromPressure(measurements.fluid, measurements.bp) : null;
  const tCond = measurements.fluid && measurements.hp ? approxTempFromPressure(measurements.fluid, measurements.hp) : null;
  const sh = tEvap !== null && measurements.tAspiration ? (parseFloat(measurements.tAspiration) - tEvap).toFixed(1) : '—';
  const sc = tCond !== null && measurements.tSortieCondenseur ? (tCond - parseFloat(measurements.tSortieCondenseur)).toFixed(1) : '—';

  doneDiv.innerHTML = `
    <h2>✅ Procédure terminée !</h2>
    <p>Toutes les 40 étapes ont été validées.<br>Complétez vos informations ci-dessous pour envoyer le rapport.</p>

    <div class="summary-card">
      <h3>📊 Récapitulatif des mesures</h3>
      <div class="summary-row"><span class="summary-label">Fluide frigorigène</span><span class="summary-value">${fluid}</span></div>
      <div class="summary-row"><span class="summary-label">Pression HP</span><span class="summary-value">${hp} bar</span></div>
      <div class="summary-row"><span class="summary-label">Pression BP</span><span class="summary-value">${bp} bar</span></div>
      <div class="summary-row"><span class="summary-label">T° condensation fluide (≈)</span><span class="summary-value">${tCond ? tCond.toFixed(1)+'°C' : '—'}</span></div>
      <div class="summary-row"><span class="summary-label">T° évaporation fluide (≈)</span><span class="summary-value">${tEvap ? tEvap.toFixed(1)+'°C' : '—'}</span></div>
      <div class="summary-row"><span class="summary-label">T° sortie condenseur</span><span class="summary-value">${tSC} °C</span></div>
      <div class="summary-row"><span class="summary-label">T° bulbe détendeur</span><span class="summary-value">${tBulbe} °C</span></div>
      <div class="summary-row"><span class="summary-label">T° aspiration compresseur</span><span class="summary-value">${tAsp} °C</span></div>
      <div class="summary-row"><span class="summary-label">🌡 Surchauffe (SH)</span><span class="summary-value">${sh} K</span></div>
      <div class="summary-row"><span class="summary-label">❄ Sous-refroidissement (SR)</span><span class="summary-value">${sc} K</span></div>
    </div>

    <div class="email-section">
      <h3>📧 Envoi du rapport par e-mail</h3>
      <div class="email-field-row">
        <label>Votre nom et prénom</label>
        <input type="text" id="inp-name" placeholder="ex: Martin Dupont" oninput="studentName=this.value">
      </div>
      <div class="email-field-row">
        <label>Destinataire</label>
        <input type="text" value="fabricecaudrelierpro@gmail.com" readonly style="opacity:0.6;cursor:not-allowed;">
      </div>
      <button class="btn-send" onclick="sendReport()">📤 Envoyer le rapport</button>
      <div class="send-feedback" id="send-fb"></div>
    </div>
  `;
}

renderDots();
renderProgress();
renderTabs();
renderStep();
